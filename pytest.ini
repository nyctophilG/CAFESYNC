[pytest]
# By default, pytest runs only unit tests. E2E tests need a live server and
# are run explicitly with: `pytest tests/e2e/`
testpaths = tests/unit
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# --strict-markers catches typos in @pytest.mark.foo
addopts =
    --strict-markers
    --tb=short
    -ra

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
