<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeSync Technical Monitoring</title>
    <!-- Bootstrap CSS for rapid styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4">CafeSync Technical Monitoring Dashboard</h2>
    
    <!-- Top-Level Metrics Cards -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card text-white bg-primary mb-3">
                <div class="card-body">
                    <h5 class="card-title">Total Requests</h5>
                    <h2 class="card-text" id="metric-total-requests">--</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success mb-3" id="health-card">
                <div class="card-body">
                    <h5 class="card-title">System Health</h5>
                    <h2 class="card-text" id="metric-system-health">--</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-info mb-3">
                <div class="card-body">
                    <h5 class="card-title">Avg Latency (ms)</h5>
                    <h2 class="card-text" id="metric-avg-latency">--</h2>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-danger mb-3">
                <div class="card-body">
                    <h5 class="card-title">500 Errors</h5>
                    <h2 class="card-text" id="metric-error-count">--</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart Row -->
    <div class="row mb-4">
        <div class="col-md-12">
            <div class="card shadow-sm">
                <div class="card-header">Real-Time Request Latency</div>
                <div class="card-body">
                    <canvas id="latencyChart" height="100"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Log Table -->
    <div class="row">
        <div class="col-md-12">
            <div class="card shadow-sm">
                <div class="card-header">Recent Telemetry Logs</div>
                <div class="card-body">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Method</th>
                                <th>Endpoint</th>
                                <th>Status</th>
                                <th>Latency (ms)</th>
                            </tr>
                        </thead>
                        <tbody id="log-table-body">
                            <!-- Populated by JavaScript -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
