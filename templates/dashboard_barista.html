<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeSync — Barista Station</title>
    <meta name="csrf-token" content="{{ csrf_token }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark border-bottom border-secondary mb-4 py-3">
    <div class="container-fluid px-4">
        <span class="navbar-brand mb-0 h1 fs-4">
            <i class="bi bi-cup-hot-fill text-warning me-2"></i>CafeSync Barista Station
        </span>
        <div class="d-flex align-items-center gap-3">
            <span class="badge bg-warning text-dark text-uppercase"><i class="bi bi-shield-fill me-1"></i>{{ role }}</span>
            <span class="text-muted small">
                <i class="bi bi-person-circle me-1"></i>{{ username }}
            </span>
            <a href="/menu" class="btn btn-sm btn-outline-info">
                <i class="bi bi-cup-hot me-1"></i>Menu
            </a>
            <a href="/2fa/setup" class="btn btn-sm btn-outline-info">
                <i class="bi bi-shield-lock me-1"></i>Security
            </a>
            <a href="/logout" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-box-arrow-right me-1"></i>Sign Out
            </a>
        </div>
    </div>
</nav>

<div class="container px-4">
    <h2 class="mb-1">Active Queue</h2>
    <p class="text-muted mb-4">Serve pending orders. New orders appear automatically as customers place them.</p>

    <div class="card">
        <div class="card-header"><i class="bi bi-list-task text-warning me-2"></i>Pending Orders</div>
        <div class="card-body p-0 table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>TxID</th>
                        <th>Item</th>
                        <th>Placed by</th>
                        <th>Status</th>
                        <th class="text-end pe-3">Action</th>
                    </tr>
                </thead>
                <tbody id="queue-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    window.CURRENT_USERNAME = "{{ username }}";
    window.CURRENT_ROLE = "{{ role }}";
</script>
<script src="/static/app_barista.js"></script>
</body>
</html>
