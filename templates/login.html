<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CafeSync — Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-wrapper { width: 100%; max-width: 420px; padding: 1rem; }
        .login-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.7);
        }
        .login-header {
            text-align: center;
            padding: 2rem 2rem 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        .login-header .brand-icon {
            font-size: 2.5rem;
            color: var(--accent-blue);
            margin-bottom: 0.5rem;
        }
        .login-body { padding: 2rem; }
        .form-control { background-color: #181818; border: 1px solid var(--border-color); color: var(--text-main); }
        .form-control:focus {
            background-color: #181818; color: var(--text-main); border-color: var(--accent-blue);
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
        }
        .btn-login {
            background-color: var(--accent-blue); border: none; font-weight: 600;
            letter-spacing: 0.5px; padding: 0.6rem;
        }
        .btn-login:hover { background-color: #2563eb; }
        .btn-passkey {
            background-color: transparent; border: 1px solid #06b6d4; color: #06b6d4;
            font-weight: 600; padding: 0.6rem;
        }
        .btn-passkey:hover { background-color: rgba(6, 182, 212, 0.1); color: #22d3ee; border-color: #22d3ee; }
        .btn-passkey:disabled { opacity: 0.5; }
        .form-check-input:checked { background-color: var(--accent-blue); border-color: var(--accent-blue); }
        .signup-link { color: var(--accent-blue); text-decoration: none; }
        .signup-link:hover { color: #60a5fa; text-decoration: underline; }
        .divider {
            display: flex; align-items: center; text-align: center;
            color: var(--text-muted); margin: 1rem 0; font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; border-bottom: 1px solid var(--border-color);
        }
        .divider:not(:empty)::before { margin-right: 0.75em; }
        .divider:not(:empty)::after { margin-left: 0.75em; }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <i class="bi bi-cpu-fill brand-icon"></i>
            <h4 class="mb-1">CafeSync Operations</h4>
            <small class="text-muted">Sign in to continue</small>
        </div>
        <div class="login-body">
            {% if notice %}
            <div class="alert alert-info d-flex align-items-center py-2" role="alert">
                <i class="bi bi-info-circle-fill me-2"></i>
                <small>{{ notice }}</small>
            </div>
            {% endif %}
            {% if error %}
            <div class="alert alert-danger d-flex align-items-center py-2" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <small>{{ error }}</small>
            </div>
            {% endif %}

            <div id="passkey-error" class="alert alert-danger py-2" style="display: none;">
                <small id="passkey-error-text"></small>
            </div>

            <button type="button" class="btn btn-passkey w-100 mb-3" id="passkey-btn">
                <i class="bi bi-fingerprint me-2"></i>Sign in with passkey
            </button>

            <div class="divider">or with password</div>

            <form method="POST" action="/login" autocomplete="on">
                <div class="mb-3">
                    <label for="username" class="form-label small text-muted text-uppercase fw-bold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0" style="border-color: var(--border-color);">
                            <i class="bi bi-person text-muted"></i>
                        </span>
                        <input type="text" class="form-control border-start-0" id="username" name="username"
                               required autocomplete="username">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label small text-muted text-uppercase fw-bold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0" style="border-color: var(--border-color);">
                            <i class="bi bi-lock text-muted"></i>
                        </span>
                        <input type="password" class="form-control border-start-0" id="password" name="password"
                               required autocomplete="current-password">
                    </div>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="remember_me" name="remember_me" value="1">
                    <label class="form-check-label small text-muted" for="remember_me">
                        Keep me signed in for 30 days
                    </label>
                </div>

                <button type="submit" class="btn btn-login w-100 text-white">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>

            <div class="text-center mt-3">
                <small class="text-muted">
                    New here? <a href="/signup" class="signup-link">Create an account</a>
                </small>
            </div>
        </div>
    </div>
    <p class="text-center text-muted small mt-3">
        <i class="bi bi-shield-lock me-1"></i>Secured session · CafeSync Pod 2
    </p>
</div>

<script src="/static/passkey.js"></script>
<script>
    const passkeyBtn = document.getElementById('passkey-btn');
    const errEl = document.getElementById('passkey-error');
    const errText = document.getElementById('passkey-error-text');

    if (!window.cafesyncPasskey || !window.cafesyncPasskey.isSupported()) {
        passkeyBtn.disabled = true;
        passkeyBtn.title = 'Your browser does not support passkeys';
    }

    passkeyBtn.addEventListener('click', async () => {
        errEl.style.display = 'none';
        passkeyBtn.disabled = true;
        passkeyBtn.innerHTML = '<i class="bi bi-fingerprint me-2"></i>Touch your device…';
        try {
            await window.cafesyncPasskey.login();
        } catch (err) {
            errText.innerText = err.message || 'Sign-in failed.';
            errEl.style.display = 'block';
            passkeyBtn.disabled = false;
            passkeyBtn.innerHTML = '<i class="bi bi-fingerprint me-2"></i>Sign in with passkey';
        }
    });
</script>

</body>
</html>
